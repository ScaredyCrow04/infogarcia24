name: Actualizar Noticias

on:
  schedule:
    - cron: '0 */2 * * *' # Ejecución cada 2 horas
  workflow_dispatch: # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías necesarias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar motor de noticias
        run: python cuervo_bot.py

      - name: Publicar cambios en el portal
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Update portal content" || exit 0
          git push
